services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: concert-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - concert-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Express Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: concert-backend
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/concert-ticketing
      JWT_SECRET: your_super_secret_jwt_key
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - concert-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: concert-frontend
    ports:
      - '4200:4200'
    depends_on:
      - backend
    networks:
      - concert-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  concert-network:
    driver: bridge
